<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>審計接案風險評估系統 - 批次分析</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .risk-high { background-color: #fee2e2; color: #991b1b; font-weight: bold; }
        .risk-safe { background-color: #ecfdf5; color: #065f46; }
    </style>
</head>
<body class="bg-gray-100 text-gray-900 font-sans">

    <header class="bg-slate-900 text-white py-10 shadow-2xl">
        <div class="container mx-auto px-6">
            <h1 class="text-3xl font-extrabold tracking-tight">接案前風險評估：多客戶橫向比較</h1>
            <p class="mt-2 text-slate-400">上傳多個客戶試算表，自動分析財務重大性與承接風險</p>
        </div>
    </header>

    <main class="container mx-auto px-6 -mt-8">
        <!-- 批次上傳區 -->
        <section class="bg-white p-8 rounded-xl shadow-lg border border-gray-200">
            <div class="flex items-center justify-between mb-6">
                <h2 class="text-xl font-bold">上傳區 (可同時選取多個檔案)</h2>
                <span class="text-sm bg-indigo-100 text-indigo-700 px-3 py-1 rounded-full font-medium">測試模式：無資安限制</span>
            </div>
            
            <div class="flex items-center justify-center w-full">
                <label class="flex flex-col w-full h-40 border-4 border-dashed border-gray-200 hover:border-indigo-400 hover:bg-indigo-50 transition-all cursor-pointer">
                    <div class="flex flex-col items-center justify-center pt-10">
                        <i class="fas fa-copy text-5xl text-gray-300"></i>
                        <p class="mt-4 text-sm text-gray-500 font-bold">點擊或選取多份客戶 Excel 檔案 (.xlsx)</p>
                    </div>
                    <input type="file" id="batch-upload" class="hidden" accept=".xlsx, .xls" multiple />
                </label>
            </div>
        </section>

        <!-- 橫向比較表 -->
        <section id="analysis-result" class="mt-10 hidden">
            <div class="bg-white rounded-xl shadow-lg overflow-hidden border border-gray-200">
                <div class="p-6 border-b bg-gray-50">
                    <h3 class="font-bold text-lg">客戶財務指標對照表</h3>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-slate-800 text-white text-xs uppercase">
                                <th class="px-6 py-4">客戶名稱 (檔案名)</th>
                                <th class="px-6 py-4 text-center">流動比率</th>
                                <th class="px-6 py-4 text-center">速動比率</th>
                                <th class="px-6 py-4 text-center">負債比率</th>
                                <th class="px-6 py-4">重大性評估 / 承接風險</th>
                            </tr>
                        </thead>
                        <tbody id="comparison-body" class="divide-y divide-gray-100">
                            <!-- JS 動態生成內容 -->
                        </tbody>
                    </table>
                </div>
            </div>
        </section>
    </main>

    <script>
        const uploadInput = document.getElementById('batch-upload');
        const resultSection = document.getElementById('analysis-result');
        const comparisonBody = document.getElementById('comparison-body');

        uploadInput.addEventListener('change', async function(e) {
            const files = Array.from(e.target.files);
            if (files.length === 0) return;

            comparisonBody.innerHTML = ""; // 清空舊資料
            resultSection.classList.remove('hidden');

            for (const file of files) {
                const data = await parseExcel(file);
                renderAnalysis(file.name, data);
            }
        });

        function parseExcel(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const workbook = XLSX.read(e.target.result, {type: 'array'});
                    const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
                    resolve(XLSX.utils.sheet_to_json(firstSheet));
                };
                reader.readAsArrayBuffer(file);
            });
        }

        function renderAnalysis(fileName, data) {
            let curAsset = 0, curLiab = 0, inv = 0, totAsset = 0, totLiab = 0;

            // 關鍵字抓取邏輯
            data.forEach(row => {
                const key = Object.values(row)[0]?.toString() || "";
                const val = parseFloat(Object.values(row)[1]) || 0;
                if(key.includes("流動資產")) curAsset += val;
                if(key.includes("流動負債")) curLiab += val;
                if(key.includes("存貨")) inv += val;
                if(key.includes("資產") && (key.includes("總") || key.includes("計"))) totAsset += val;
                if(key.includes("負債") && (key.includes("總") || key.includes("計"))) totLiab += val;
            });

            const cr = curLiab !== 0 ? (curAsset / curLiab).toFixed(2) : "0.00";
            const qr = curLiab !== 0 ? ((curAsset - inv) / curLiab).toFixed(2) : "0.00";
            const dr = totAsset !== 0 ? (totLiab / totAsset).toFixed(2) : "0.00";

            // 風險判定邏輯
            let riskText = "🟢 風險低 (正常)";
            let riskClass = "risk-safe";
            if (dr > 0.7 || cr < 1.0) {
                riskText = "🔴 高風險 (財務結構不穩)";
                riskClass = "risk-high";
            } else if (dr > 0.5 || cr < 1.5) {
                riskText = "🟡 中風險 (需關注現金流)";
                riskClass = "";
            }

            const tr = document.createElement('tr');
            tr.className = "hover:bg-gray-50 transition-colors";
            tr.innerHTML = `
                <td class="px-6 py-4 font-medium text-indigo-700">${fileName}</td>
                <td class="px-6 py-4 text-center font-mono ${cr < 1.5 ? 'text-red-500 font-bold' : ''}">${cr}</td>
                <td class="px-6 py-4 text-center font-mono">${qr}</td>
                <td class="px-6 py-4 text-center font-mono ${dr > 0.6 ? 'text-red-500 font-bold' : ''}">${dr}</td>
                <td class="px-6 py-4"><span class="px-3 py-1 rounded-full text-xs ${riskClass}">${riskText}</span></td>
            `;
            comparisonBody.appendChild(tr);
        }
    </script>
</body>
</html>
