<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>專業審計員導航入口</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-50 text-gray-800 font-sans">

    <!-- Header -->
    <header class="bg-slate-800 text-white py-8 shadow-lg">
        <div class="container mx-auto px-6">
            <h1 class="text-3xl font-bold">審計自動化與工具導航系統</h1>
            <p class="mt-2 text-slate-300">專業、精確、效率：您的查核作業中樞</p>
        </div>
    </header>

    <main class="container mx-auto px-6 py-10">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            
            <!-- 工具區塊 1: 抽樣與統計 -->
            <div class="bg-white p-6 rounded-xl shadow-md border-t-4 border-blue-500">
                <div class="flex items-center mb-4 text-blue-600 text-xl font-semibold">
                    <i class="fas fa-calculator mr-3"></i> 抽樣與統計工具
                </div>
                <ul class="space-y-3">
                    <li class="hover:text-blue-500 cursor-pointer">● MUS (金額單位抽樣) 指引</li>
                    <li class="hover:text-blue-500 cursor-pointer">● 樣本數計算器 (Confidence Level)</li>
                    <li class="hover:text-blue-500 cursor-pointer">● 隨機亂數產生器</li>
                </ul>
            </div>

            <!-- 工具區塊 2: 資料轉換 (ETL) -->
            <div class="bg-white p-6 rounded-xl shadow-md border-t-4 border-emerald-500">
                <div class="flex items-center mb-4 text-emerald-600 text-xl font-semibold">
                    <i class="fas fa-database mr-3"></i> 資料清理與分析
                </div>
                <ul class="space-y-3">
                    <li class="hover:text-emerald-500 cursor-pointer">● Python/Pandas 資料自動比對指令</li>
                    <li class="hover:text-emerald-500 cursor-pointer">● SQL 常查核指令 (Join, Group By)</li>
                    <li class="hover:text-emerald-500 cursor-pointer">● PowerBI 報表串接指引</li>
                </ul>
            </div>

            <!-- 工具區塊 3: 外部資源 -->
            <div class="bg-white p-6 rounded-xl shadow-md border-t-4 border-amber-500">
                <div class="flex items-center mb-4 text-amber-600 text-xl font-semibold">
                    <i class="fas fa-link mr-3"></i> 法規與底稿資源
                </div>
                <ul class="space-y-3">
                    <li class="hover:text-amber-500 cursor-pointer">● IFRS 國際會計準則查詢</li>
                    <li class="hover:text-amber-500 cursor-pointer">● 內部控制自評範本</li>
                    <li class="hover:text-amber-500 cursor-pointer">● 各國稅務申報時程表</li>
                </ul>
            </div>

        </div>

        <!-- 快速筆記區 -->
        <section class="mt-12 bg-white p-8 rounded-xl shadow-inner border border-gray-200">
            <h2 class="text-xl font-bold mb-4">查核重點筆記</h2>
            <textarea class="w-full h-40 p-4 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-400 outline-none" placeholder="在此輸入今日查核重點或待辦事項..."></textarea>
        </section>
    </main>

    <footer class="text-center py-10 text-gray-400 text-sm">
        © 2026 審計員專業工具集 | 全效能工作流
    </footer>

</body>
</html>
